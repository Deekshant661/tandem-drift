name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build client
        # SERVER_URL is a repository variable (Settings → Secrets and variables
        # → Actions → Variables), e.g. wss://tandem-drift.onrender.com
        run: npm run build -w @tandem/client
        env:
          VITE_SERVER_URL: ${{ vars.SERVER_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist
      - id: deployment
        uses: actions/deploy-pages@v4
